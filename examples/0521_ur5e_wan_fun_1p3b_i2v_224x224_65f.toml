# UR5e 4-task pick-place -> Wan2.1-Fun-1.3B-InP image-to-video full fine-tuning.
# Original 224x224, 65 frames @ framerate=5 (matches old 0425 config).
# Single RTX 5090 (32GB).

output_dir = '/home/riftuser/diffusion_pipe_training_runs/0521_ur5e_wan_fun_1p3b_i2v_224x224_65f'
dataset = '/home/riftuser/diffusion-pipe/examples/ur5e_pick_place_224_train_dataset.toml'
eval_datasets = [
    {name = 'valid', config = '/home/riftuser/diffusion-pipe/examples/ur5e_pick_place_224_valid_dataset.toml'},
]

# training settings
epochs = 1000
# Same mb=2/accum=2 as 256x192 run; global batch = 4.
# 224x224x65 has ~62% more voxels so VRAM will be tighter (~28-31GB expected). Watch nvidia-smi first 10 min.
micro_batch_size_per_gpu = 2
pipeline_stages = 1
gradient_accumulation_steps = 2
gradient_clipping = 1.0
warmup_steps = 100

# eval settings
eval_every_n_epochs = 4
eval_before_first_step = false
eval_micro_batch_size_per_gpu = 1
eval_gradient_accumulation_steps = 1

# misc settings
save_every_n_epochs = 5
checkpoint_every_n_minutes = 60
activation_checkpointing = true
partition_method = 'parameters'
save_dtype = 'bfloat16'
caching_batch_size = 1
steps_per_print = 1
video_clip_mode = 'single_beginning'
video_clip_pad_last_frame = true

[model]
type = 'wan'
ckpt_path = '/home/riftuser/models/Wan2.1-Fun-1.3B-InP'
dtype = 'bfloat16'
timestep_sample_method = 'logit_normal'
framerate = 5

[optimizer]
type = 'adamw_optimi'
lr = 1e-5
betas = [0.9, 0.99]
weight_decay = 0.01
eps = 1e-8

[monitoring]
enable_wandb = true
wandb_api_key = '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'
wandb_tracker_name = 'WAN'
wandb_run_name = '0521_ur5e_pick_place_224x224_65f'
